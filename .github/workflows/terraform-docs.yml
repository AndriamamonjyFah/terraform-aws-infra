name: Terraform Docs

on:
  push:
    branches: [main]
    paths:
      - "modules/**/*.tf"
      - "environments/**/*.tf"

permissions:
  contents: write
  pull-requests: write

jobs:
  terraform-docs:
    name: Generate Terraform Docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Render docs for module vpc
        uses: terraform-docs/gh-actions@v1
        with:
          working-dir: modules/vpc
          output-file: README.md
          output-method: inject
          git-push: "true"

      - name: Render docs for module ec2
        uses: terraform-docs/gh-actions@v1
        with:
          working-dir: modules/ec2
          output-file: README.md
          output-method: inject
          git-push: "true"

      - name: Render docs for module security
        uses: terraform-docs/gh-actions@v1
        with:
          working-dir: modules/security
          output-file: README.md
          output-method: inject
          git-push: "true"
